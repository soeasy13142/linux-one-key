# ============================================
# auditd 主配置模板 - linux-one-key
# 此文件仅作参考，实际配置由 audit.sh 自动生成
# ============================================

# 日志文件路径
log_file = /var/log/audit/audit.log

# 日志格式 (RAW = 原始格式)
log_format = RAW

# 日志文件属组
log_group = root

# 守护进程优先级提升
priority_boost = 4

# 日志刷新策略 (INCREMENTAL_ASYNC = 异步增量刷新)
flush = INCREMENTAL_ASYNC

# 刷新频率（秒）
freq = 50

# 单个日志文件最大大小（MB）
max_log_file = 50

# 保留日志文件份数
num_logs = 10

# 日志文件达到最大大小时的动作
# SUSPEND = 暂停, IGNORE = 忽略, ROTATE = 轮转, SYSLOG = 发送syslog, KEEP_LOGS = 保留
max_log_file_action = ROTATE

# 剩余空间告警阈值（MB）
space_left = 75

# 剩余空间不足时的动作
space_left_action = SYSLOG

# 管理员剩余空间阈值（MB）
admin_space_left = 50

# 管理员空间不足时的动作
admin_space_left_action = SUSPEND

# 磁盘满时的动作
disk_full_action = SUSPEND

# 磁盘错误时的动作
disk_error_action = SUSPEND

# 是否使用 libwrap
use_libwrap = yes

# TCP 监听队列长度
tcp_listen_queue = 5

# 每个地址最大 TCP 连接数
tcp_max_per_addr = 1

# TCP 客户端最大空闲时间
tcp_client_max_idle = 0

# 是否启用 Kerberos 认证
enable_krb5 = no

# Kerberos 主体名称
krb5_principal = auditd

# 是否分布式网络
distribute_network = no
